<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <title>G's Split – Two Sections (Mobile)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="color-scheme" content="dark light" />
  <style>
    :root {
      --bg: #0f1115; --card:#181b22; --text:#e7eaf0; --muted:#a6adbb;
      --plus:#27ae60; --min:#e74c3c; --reset:#5f6a7a; --focus:#1f6feb; --accent:#ff7a00; --accent-red:#ff1e00;
      --overlay-dark: rgba(0,0,0,.45); --overlay-darker: rgba(0,0,0,.55);
      /* Use relative/HTTPS for mobile */
      --img-guinness: url("./images/guinness.jpg");
      --img-pitcrew: url("./images/pitcrew.jpg");
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{height:100%}
    body{margin:0;background:linear-gradient(180deg,#0b0d11 0%,#0f1115 100%);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,Helvetica,sans-serif;padding-bottom:env(safe-area-inset-bottom)}
    .app{max-width:1000px;margin:0 auto;padding:16px;padding-left:max(16px,env(safe-area-inset-left));padding-right:max(16px,env(safe-area-inset-right))}
    .js-status{background:#2a2f3a;border-left:4px solid #f44336;padding:10px;margin:12px 0;border-radius:8px}
    .hidden{display:none}

    .section{position:relative;background:#10131a;border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:14px;margin:14px 0;overflow:hidden;isolation:isolate;touch-action:manipulation}
    .section>*{position:relative;z-index:2}
    .section::after{content:"";position:absolute;inset:0;box-shadow:inset 0 0 0 1px rgba(255,255,255,.06);pointer-events:none;z-index:1}
    .section-header{position:sticky;top:0;z-index:3;padding-top:6px;padding-bottom:8px;margin:-14px -14px 12px -14px;padding-left:14px;padding-right:14px;background:rgba(0,0,0,.35);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
    h2{margin:0;font-size:20px}
    h2::before{content:"";width:16px;height:4px;border-radius:4px;background:linear-gradient(90deg,#ff1e00,var(--accent));display:inline-block;margin-right:8px}

    .add-form{display:flex;gap:8px;align-items:center;background:#0d0f14;padding:6px;border-radius:10px;flex:1 1 260px;min-width:240px}
    .add-form input{flex:1;padding:12px;border-radius:8px;border:1px solid rgba(255,255,255,.15);background:#171a22;color:var(--text);font-size:16px;min-width:140px}
    .add-form button{padding:12px 14px;border:none;border-radius:8px;background:linear-gradient(90deg,#ff1e00,var(--accent));color:#fff;font-size:16px;min-height:44px}

    .grid{display:grid;grid-template-columns:1fr;gap:12px;margin-top:10px}
    @media(min-width:520px){.grid{grid-template-columns:repeat(2,1fr)}}
    @media(min-width:860px){.grid{grid-template-columns:repeat(3,1fr)}}

    .card{background:var(--card);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:14px;display:grid;gap:8px;text-align:center;user-select:none}
    .name{font-weight:600;font-size:18px;outline:none;border-radius:6px;padding:4px 6px}
    .name:focus{box-shadow:0 0 0 2px var(--focus);background:#0e213f}
    .score{font-size:40px}
    .controls{display:flex;justify-content:center;gap:10px}
    button.plus{background:var(--plus);color:#fff}
    button.min{background:var(--min);color:#fff}
    button.reset{background:var(--reset);color:#fff}
    .footer-actions{display:flex;gap:10px;justify-content:center;margin-top:10px;flex-wrap:wrap}
    .empty{color:var(--muted);text-align:center;padding:8px 0}

    /* Section 1: Guinness background (mobile-safe if images exist) */
    #section-scoreboard{background:linear-gradient(0deg,var(--overlay-darker),var(--overlay-darker)),var(--img-guinness);background-size:cover;background-position:center}
    #section-scoreboard .card{background:rgba(20,23,30,.82);backdrop-filter:blur(2px)}

    /* Section 2: Pit crew background + red border */
    #section-pitstops{background:linear-gradient(0deg,var(--overlay-dark),var(--overlay-dark)),var(--img-pitcrew);background-size:cover;background-position:center;border:2px solid var(--accent-red);box-shadow:0 0 0 3px rgba(255,30,0,.15) inset,0 6px 24px rgba(255,30,0,.15)}
    #section-pitstops .card{background:rgba(24,27,34,.85);border:1px solid rgba(255,30,0,.25)}
  </style>
</head>
<body>
  <div class="app">
    <div id="jsStatus" class="js-status">⚠️ JavaScript is niet gestart. Open dit bestand in Safari/Chrome, niet in een viewer.</div>

    <!-- Section 1: Scoreboard -->
    <section class="section" id="section-scoreboard" aria-label="Scorebord">
      <div class="section-header">
        <h2>G's Split</h2>
        <form class="add-form" data-section="scoreboard" aria-label="Speler toevoegen" autocomplete="off">
          <input type="text" name="name" placeholder="Naam speler" required inputmode="text" />
          <button type="submit">Toevoegen</button>
        </form>
      </div>
      <div class="empty" data-empty="scoreboard" hidden>Geen spelers toegevoegd. Voeg een naam toe om te beginnen.</div>
      <div class="grid" data-grid="scoreboard" aria-live="polite"></div>
      <div class="footer-actions">
        <button class="reset" data-reset-all="scoreboard">Reset alle scores</button>
        <button class="reset" data-clear-all="scoreboard">Alles wissen</button>
      </div>
    </section>

    <!-- Section 2: Correct pit stop guesses -->
    <section class="section" id="section-pitstops" aria-label="Juiste pitstop-voorspellingen">
      <div class="section-header">
        <h2>Correct pit stop guesses</h2>
        <form class="add-form" data-section="pitstops" aria-label="Deelnemer toevoegen" autocomplete="off">
          <input type="text" name="name" placeholder="Naam deelnemer" required inputmode="text" />
          <button type="submit">Toevoegen</button>
        </form>
      </div>
      <div class="empty" data-empty="pitstops" hidden>Geen deelnemers toegevoegd. Voeg een naam toe om te beginnen.</div>
      <div class="grid" data-grid="pitstops" aria-live="polite"></div>
      <div class="footer-actions">
        <button class="reset" data-reset-all="pitstops">Reset alle scores</button>
        <button class="reset" data-clear-all="pitstops">Alles wissen</button>
      </div>
    </section>
  </div>

  <script>
    // Hide banner when JS runs
    (function(){ var s=document.getElementById('jsStatus'); if(s) s.classList.add('hidden'); })();

    // Helpers
    function $(sel){ return document.querySelector(sel); }
    function $all(sel){ return Array.prototype.slice.call(document.querySelectorAll(sel)); }
    function uid(){ return (Date.now().toString(36)+Math.random().toString(36).slice(2,8)).replace(/[^a-z0-9]/g,''); }
    function escapeHtml(str){ str=String(str); return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;'); }

    var STORAGE_KEYS = { scoreboard:'scoreboardPlayers_v1', pitstops:'pitstopGuesses_v1' };
    var state = { scoreboard:[], pitstops:[] };

    function loadSection(section){
      try{ var raw=localStorage.getItem(STORAGE_KEYS[section]); var arr=raw?JSON.parse(raw):[]; state[section]=Array.isArray(arr)?arr:[]; }
      catch(e){ state[section]=[]; }
    }
    function saveSection(section){ try{ localStorage.setItem(STORAGE_KEYS[section], JSON.stringify(state[section])); }catch(e){} }

    function renderSection(section){
      var grid=document.querySelector('[data-grid="'+section+'"]');
      var empty=document.querySelector('[data-empty="'+section+'"]');
      var items=state[section];
      if(!items.length){ grid.innerHTML=''; empty.hidden=false; return; }
      empty.hidden=true;
      grid.innerHTML = items.map(function(p){
        return ''+
        '<article class="card" data-section="'+section+'" data-id="'+p.id+'">'+
          '<div class="name" contenteditable="true" spellcheck="false" role="textbox" aria-label="Naam bewerken">'+escapeHtml(p.name)+'</div>'+
          '<div class="score" aria-live="polite">'+p.score+'</div>'+
          '<div class="controls">'+
            '<button class="min" type="button" aria-label="Min één">-1</button>'+
            '<button class="plus" type="button" aria-label="Plus één">+1</button>'+
          '</div>'+
          '<button class="reset" type="button" aria-label="Score resetten">Reset</button>'+
        '</article>';
      }).join('');
    }

    function addItem(section,name){ var t=(name||'').trim(); if(!t) return; state[section].push({id:uid(),name:t,score:0}); saveSection(section); renderSection(section); }
    function findById(items,id){ for(var i=0;i<items.length;i++){ if(items[i].id===id) return items[i]; } return null; }
    function adjustScore(section,id,delta){ var item=findById(state[section],id); if(!item) return; item.score+=delta; saveSection(section); var el=document.querySelector('[data-section="'+section+'"][data-id="'+id+'"] .score'); if(el) el.textContent=item.score; }
    function resetScore(section,id){ var item=findById(state[section],id); if(!item) return; item.score=0; saveSection(section); var el=document.querySelector('[data-section="'+section+'"][data-id="'+id+'"] .score'); if(el) el.textContent='0'; }
    function renameItem(section,id,newName){ var item=findById(state[section],id); if(!item) return; var nm=(newName||'').trim(); item.name= nm || 'Naam'; saveSection(section); }
    function resetAll(section){ state[section]=state[section].map(function(p){return {id:p.id,name:p.name,score:0};}); saveSection(section); renderSection(section); }
    function clearAll(section){ if(!state[section].length) return; if(!confirm('Alles wissen? Dit kan niet ongedaan worden gemaakt.')) return; state[section]=[]; saveSection(section); renderSection(section); }

    // Events
    $all('.add-form').forEach(function(form){
      form.addEventListener('submit', function(e){ e.preventDefault(); var section=form.dataset.section; var input=form.querySelector('input[name="name"]'); addItem(section,input.value); input.value=''; input.focus(); });
    });

    document.body.addEventListener('click', function(e){
      var btn=e.target.closest('button'); var card=e.target.closest('.card');
      if(btn && card){ var section=card.dataset.section; var id=card.dataset.id;
        if(btn.classList.contains('plus')) adjustScore(section,id,1);
        else if(btn.classList.contains('min')) adjustScore(section,id,-1);
        else if(btn.classList.contains('reset')) resetScore(section,id);
      }
      if(btn && btn.dataset.resetAll) resetAll(btn.dataset.resetAll);
      if(btn && btn.dataset.clearAll) clearAll(btn.dataset.clearAll);
    });

    document.body.addEventListener('keydown', function(e){ if(e.target && e.target.matches('.name') && e.key==='Enter'){ e.preventDefault(); e.target.blur(); }});
    document.body.addEventListener('blur', function(e){ if(!(e.target && e.target.matches('.name'))) return; var card=e.target.closest('.card'); if(!card) return; renameItem(card.dataset.section, card.dataset.id, e.target.textContent); }, true);

    // Init both sections
    ['scoreboard','pitstops'].forEach(loadSection);
    ['scoreboard','pitstops'].forEach(renderSection);
  </script>
</body>
</html>
